spring:
  application:
    name: deliverypedidos

  datasource:
    url: jdbc:h2:file:./data/deliverydb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: "chave-de-desenvolvimento-delivery-pedidos-troque-em-producao-1234567890"
  expiration: 3600000

